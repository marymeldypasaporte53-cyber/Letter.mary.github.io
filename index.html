!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Jerica 💖</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
    text-align: center;
    background: linear-gradient(to top, #ffd6e0, #fff);
}

h1, h3 {
    margin-top: 20px;
}

#heart {
    position: absolute;
    font-size: 40px;
    cursor: pointer;
}

#messageBox {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: white;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 0 20px rgba(0,0,0,0.2);
    width: 80%;
    max-width: 350px;
}

.btn {
    padding: 10px 15px;
    margin: 5px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #ff7aa2;
    color: white;
    font-weight: bold;
}

.btn:hover {
    transform: scale(1.1);
}
</style>
</head>

<body>

<h1 id="title">Catch 15 hearts 💖</h1>
<h3 id="score">Hearts: 0 / 15</h3>

<div id="heart">💖</div>
<div id="messageBox"></div>

<audio id="happyMusic" src="https://www.fesliyanstudios.com/play-mp3/387"></audio>

<script>
let score = 0;
let level = 1;
let heart = document.getElementById("heart");
let herName = "Jerica";

function moveHeart() {
    let x = Math.random() * (window.innerWidth - 50);
    let y = Math.random() * (window.innerHeight - 50);
    heart.style.left = x + "px";
    heart.style.top = y + "px";
}

heart.onclick = function() {
    score++;

    if (level === 1) {
        document.getElementById("score").innerText = "Hearts: " + score + " / 15";

        if (score >= 15) {
            heart.style.display = "none";
            showWinLevel1();
        } else {
            moveHeart();
        }

    } else {
        document.getElementById("score").innerText = "Hearts: " + score + " / 10";

        if (score >= 10) {
            showFinalMessage();
        } else {
            moveHeart();
        }
    }
};

function showWinLevel1() {
    let box = document.getElementById("messageBox");
    box.style.display = "block";

    box.innerHTML = `
        🎉 You win, ${herName}! 💖<br><br>
        Ready for the next level? 😔<br><br>
        <button class="btn" onclick="startLevel2()">Continue 💌</button>
    `;
}

function startLevel2() {
    level = 2;
    score = 0;

    document.getElementById("messageBox").style.display = "none";
    document.getElementById("heart").style.display = "block";

    document.getElementById("title").innerText = "Catch 10 hearts 💖";
    document.getElementById("score").innerText = "Hearts: 0 / 10";

    moveHeart();
}

function showFinalMessage() {
    let box = document.getElementById("messageBox");

    document.getElementById("heart").style.display = "none";
    document.getElementById("title").style.display = "none";
    document.getElementById("score").style.display = "none";

    box.style.display = "block";

    box.innerHTML = `
        <div style="font-size:50px;">💌</div>
        <h3>A letter for you, ${herName}</h3>
        <button class="btn" onclick="openLetter()">Open 💖</button>
    `;
}

function openLetter() {
    let box = document.getElementById("messageBox");

    box.innerHTML = `
        <h2>💖 ${herName} 💖</h2>
        <p>I know I hurt you… and I regret it.</p>
        <p>I want to be better and prove it to you.</p>
        <b>Can I still fix this with you?</b><br><br>

        <button class="btn" onclick="yes()">Yes 💖</button>
    `;
}

function yes() {
    document.getElementById("happyMusic").play();
    document.body.innerHTML = `
        <h1 style="margin-top:40%;">💖 Thank you, ${herName} 😭💕<br>I’ll do better.</h1>
    `;
}

moveHeart();
</script>

</body>
</html>
